<!DOCTYPE html>
<!-- -------------------------------------------- -->
<!-- ---------------- MQTT DEBUG Monitor -------- -->
<html>
<head>
	<meta charset="UTF-8">
	<title>Lab 4E MQTT Monitor</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="lib/styles.css">
	<style>
		.monitor { padding: 20px 24px; max-width: 520px; margin: 0 auto; font-family: inherit; }
		.monitor h3 { font-size: 1.1rem; font-weight: 600; margin: 0 0 16px 0; color: #333; }
		#status {
			display: inline-block;
			padding: 8px 14px;
			border-radius: 8px;
			font-size: 0.85rem;
			font-weight: 600;
			margin-bottom: 18px;
			transition: background 0.2s ease;
		}
		#status:not(.connected) { background: #e8a0a0; color: #5c2020; }
		#status.connected { background: #5cb87a; color: #fff; }
		.monitor form { margin-bottom: 20px; }
		.monitor label { display: block; font-size: 0.8rem; font-weight: 500; color: #555; margin-bottom: 4px; }
		.monitor input[type="text"],
		.monitor input[type="password"],
		.monitor textarea {
			width: 100%;
			padding: 10px 12px;
			border: 1px solid #ccc;
			border-radius: 8px;
			font-size: 0.9rem;
			font-family: inherit;
			margin-bottom: 12px;
			background: #fff;
		}
		.monitor input:focus, .monitor textarea:focus {
			outline: none;
			border-color: #4a6fd6;
			box-shadow: 0 0 0 2px rgba(74, 111, 214, 0.15);
		}
		.monitor .btn {
			background: linear-gradient(180deg, #4a6fd6 0%, #3555b0 100%);
			color: white;
			border: none;
			padding: 10px 18px;
			font-size: 0.85rem;
			font-weight: 600;
			font-family: inherit;
			border-radius: 8px;
			cursor: pointer;
			transition: transform 0.1s ease, box-shadow 0.2s ease;
			box-shadow: 0 2px 6px rgba(0,0,0,0.15);
		}
		.monitor .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
		.monitor .btn:active { transform: translateY(0); }
		.monitor hr { border: none; height: 1px; background: #e0e0e0; margin: 20px 0; }
		#messages {
			width: 100%;
			height: 280px;
			padding: 12px 14px;
			border: 1px solid #ddd;
			border-radius: 10px;
			font-size: 0.8rem;
			line-height: 1.5;
			font-family: ui-monospace, monospace;
			background: #f8fafb;
			color: #1a1a1a;
			resize: vertical;
			overflow-y: auto;
		}
		.monitor .messages-label { font-size: 0.8rem; font-weight: 500; color: #555; margin-bottom: 6px; }
	</style>
	<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
		
	<!-- -------------------------------------------- -->
	<!-- ----------  JAVA Script Section  ----------- -->

	<script type = "text/javascript">
		
		//const mqtt = require('mqtt')
		var url = "";
		var options = {};
		var client;
		var connected_flag = 0;
		var reconnectTimeout = 3000;

		//Functions that update the DOM
		function set_status(status_str){
			console.log(status_str);
			var el = document.getElementById("status");
			el.innerHTML = status_str;
			el.classList.add("connected");
		}

		function set_message(message_str){
			if(message_str != ""){
				console.log(message_str);
			}
			document.getElementById("messages").innerHTML = message_str;
		}

		function set_all(error_msg){
			console.log(error_msg);
			var statusEl = document.getElementById("status");
			statusEl.innerHTML = error_msg;
			statusEl.classList.remove("connected");
			document.getElementById("messages").innerHTML = error_msg;
		}

		function append_message(message_str){
			console.log(message_str);
			document.getElementById("messages").innerHTML = message_str + "\n" + document.getElementById("messages").innerHTML;
		}

		//Functions that update the DOM
		function onConnectionLost(){
			connected_flag=0;
			set_all("connection lost");
		}
	
		function onFailure(message){
			connected_flag=0;
			set_all("Connection Failed, Retrying")

			//Try again in reconnectTimeout ms
			setTimeout(MQTTRetryConnect, reconnectTimeout);	
		}

		function onMessageArrived(data, topic){
			out_msg="Recv msg of topic '" + topic +"': "+data;
			append_message(out_msg);
		}


		function onConnect(){
			connected_flag=1
			set_status("Connected");
			set_message("");
		}


		function MQTTRetryConnect(){
			//Check if disconected. If we are already connected, skip so that there are not multiple instances
			if( connected_flag == 1){
				return false;
			} else {
				return MQTTconnect();
			}
		}

		function MQTTconnect(){

			
			//Read user config
			url = document.forms["connform"]["server"].value;
			options = {
				// Clean session
				clean: true,
				connectTimeout: 4000,
				keepalive: 4000,
				// Authentication
				clientId: document.forms["connform"]["cid"].value,
				username: document.forms["connform"]["name"].value,
				password: document.forms["connform"]["pass"].value,
			}

			console.log("connecting to " + url + " using : ");
			console.log(options);
			client  = mqtt.connect(url, options)

			client.on('connect', function (connack) {
				if(connected_flag == 0){
					onConnect();	
				}
			})
			
			client.on('reconnect', function () {
				console.log('Reconnecting...')
			})

			client.on('close', function () {
				console.log('Closed, Reconnecting...')
			})

			client.on('disconnect', function (packet) {
				onConnectionLost()
			})

			client.on('error', function (error) {
				onFailure(error)
			})

			client.on('message', function (topic, payload, packet) {
				onMessageArrived(payload.toString(), topic)
			})
			
			return false;
		}

		function sub_topics(){
			
			if (connected_flag==0){
				set_message("Not Connected -- Subscribe failed");
				return false;
			}

			var stopic= document.forms["subs"]["Stopic"].value;

			client.subscribe(stopic, { qos: 0 }, function (error, granted) {
				if (error) {
					console.log(error)
					append_message("Failed to subscribe to topic : "+stopic)
				} else {
					append_message("Subscribed to topic : "+stopic)
				}
			})

			return false;
		}

		function send_message(){

			if (connected_flag==0){
				set_message("Not Connected -- Send failed");
				return	false;
			}

			var msg = document.forms["smessage"]["message"].value;
			var topic = document.forms["smessage"]["Ptopic"].value;

			if (topic==""){
				topic = "test-topic"
			}

			// Send a test message with QoS of 0 to the testtopic
			client.publish(topic, msg, { qos: 0, retain: false }, function (error) {
				if (error) {
					console.log(error)
				} else {
					append_message("Sent msg to '"+topic+"': " + msg)
				}
			})

			return false;
		}
	</script>

   
	<script>
		function on_page_load(){
			clientId  = document.forms["connform"]["cid"].value
			sesion_id = Math.floor(Math.random() * 65535).toString();
			clientId  = "EE445L_" + sesion_id
			document.forms["connform"]["cid"].value = clientId
			console.log("Set ID to:" + clientId)
		}

		document.addEventListener("DOMContentLoaded", on_page_load);
	</script>

</head>
	
 <!-- --------------------------------------------------------------------------------- -->
 <!-- -------------------------------  BODY of the MQTT Monitor ----------------------- --> 
 <!-- --------------------------------------------------------------------------------- -->

 
<body>
	<div class="monitor">
		<h3>Lab 4E MQTT Monitor</h3>
		<div id="status">Not connected</div>

		<form name="connform" action="" onsubmit="return MQTTconnect()">
			<label>Server</label>
			<input type="text" name="server" value="ws://192.168.137.239:9001" placeholder="ws://host:port">
			<label>Client ID</label>
			<input type="text" name="cid" value="">
			<label>User name</label>
			<input type="text" name="name" value="nm34484_sds4578">
			<label>Password</label>
			<input type="password" name="pass" value="">
			<button type="submit" class="btn">Connect</button>
		</form>

		<hr>
		<form name="subs" action="" onsubmit="return sub_topics()">
			<label>Subscribe topic (use b2w/# to see board → web: mode, hour, min, sec)</label>
			<input type="text" name="Stopic" value="nm34484_sds4578/b2w/#">
			<button type="submit" class="btn">Subscribe</button>
		</form>

		<hr>
		<form name="smessage" action="" onsubmit="return send_message()">
			<label>Publish topic (use w2b to send commands to board)</label>
			<input type="text" name="Ptopic" value="nm34484_sds4578/w2b">
			<label>Message</label>
			<input type="text" name="message" placeholder="Payload to send">
			<button type="submit" class="btn">Publish</button>
		</form>

		<hr>
		<div class="messages-label">Received messages</div>
		<textarea id="messages" readonly>No messages yet.</textarea>
	</div>
	</body>
</html>
