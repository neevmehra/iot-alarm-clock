<!DOCTYPE html>
<html>
<head>
	<title>EE445L LAB 4E: Web Controller</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { overflow: hidden; height: 100vh; background: #e8eaed; font-family: system-ui, sans-serif; }
		.layout { display: flex; height: 100vh; width: 100%; }
		.left-col {
			width: 340px;
			min-width: 340px;
			display: flex;
			flex-direction: column;
			background: #f0f2f5;
			box-shadow: 2px 0 12px rgba(0,0,0,0.06);
		}
		.left-col iframe:first-child {
			height: 170px;
			min-height: 170px;
			border: none;
			display: block;
		}
		.left-col iframe:last-child {
			flex: 1;
			min-height: 0;
			border: none;
			display: block;
		}
		.right-col {
			flex: 1;
			min-width: 0;
			background: #fff;
		}
		.right-col iframe {
			width: 100%;
			height: 100%;
			border: none;
			display: block;
		}
	</style>
</head>
<body>
	<div class="layout">
		<div class="left-col">
			<iframe name="clocks" src="internet_time.htm" title="Internet time"></iframe>
			<iframe name="control" src="mqtt_app.htm" title="MQTT control"></iframe>
		</div>
		<div class="right-col">
			<iframe name="mqtt_status" src="mqtt_monitor.htm" title="MQTT status"></iframe>
		</div>
	</div>
</body>
</html>
